<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQIRAX · fuera de servicio</title>
  <!-- Open Graph / Discord embed -->
  <meta property="og:title" content="AQIRAX · fuera de servicio" />
  <meta property="og:description" content="El portal de AQIRAX está fuera de servicio. Vuelve más tarde." />
  <meta property="og:image" content="https://i.imgur.com/oZotBXK.jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://aqirax.com" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#6c2bd9" />

  <!-- Font Awesome 6 (icon pack) solo para los pocos iconos necesarios -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      padding: 1.5rem;
      background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 50%, #e0e0e0 100%);
      animation: gradientShift 14s ease-in-out infinite alternate;
      position: relative;
    }

    @keyframes gradientShift {
      0% { background: linear-gradient(145deg, #050505 0%, #1e1e1e 50%, #d4d4d4 100%); }
      50% { background: linear-gradient(145deg, #0f0f0f 0%, #2a2a2a 50%, #f0f0f0 100%); }
      100% { background: linear-gradient(145deg, #000000 0%, #181818 50%, #c0c0c0 100%); }
    }

    /* tarjeta principal — más limpia, sin tanto icono */
    .offline-card {
      max-width: 580px;
      width: 100%;
      background: rgba(8, 8, 8, 0.6);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 3rem;
      padding: 2.8rem 2.2rem 2.5rem;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      border: 1px solid rgba(255, 255, 255, 0.04);
      text-align: center;
      animation: softFloat 6s ease-in-out infinite;
      transition: transform 0.25s ease;
    }

    @keyframes softFloat {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* icono principal (solo uno grande) */
    .main-icon {
      font-size: 4.2rem;
      color: #eaeaea;
      margin-bottom: 0.2rem;
      display: inline-block;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.6));
      animation: subtlePulse 3.5s ease-in-out infinite;
    }

    @keyframes subtlePulse {
      0% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.04); }
      100% { opacity: 0.8; transform: scale(1); }
    }

    /* separador minimal */
    .divider-line {
      width: 70px;
      height: 2px;
      margin: 0.4rem auto 0.8rem;
      background: linear-gradient(90deg, transparent, #b0b0b0, transparent);
      opacity: 0.5;
    }

    h1 {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(to right, #f2f2f2, #b8b8b8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
      margin: 0.2rem 0 0.1rem;
    }

    .subtitle {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 3px;
      color: #b0b0b0;
      background: rgba(0, 0, 0, 0.25);
      padding: 0.3rem 1.6rem;
      border-radius: 60px;
      display: inline-block;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 255, 0.03);
      margin: 0.3rem auto 1rem;
    }

    /* mensaje principal con un solo icono acompañante */
    .status-message {
      font-size: 1.6rem;
      font-weight: 400;
      color: #f0f0f0;
      background: rgba(0, 0, 0, 0.3);
      padding: 1rem 1.6rem;
      border-radius: 90px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.04);
      margin: 1.2rem 0 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .status-message i {
      font-size: 1.8rem;
      color: #d0d0d0;
      animation: blinkSoft 2.4s infinite;
    }

    @keyframes blinkSoft {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* badge pequeño con solo un icono */
    .badge-mini {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      color: #c8c8c8;
      font-size: 0.9rem;
      letter-spacing: 1px;
      background: rgba(0, 0, 0, 0.15);
      padding: 0.3rem 1.4rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(2px);
      width: fit-content;
      margin: 0.2rem auto 0.4rem;
    }

    .badge-mini i {
      font-size: 1.2rem;
      color: #d4d4d4;
    }

    /* pie de página minimal */
    .footer-note {
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 1.5px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      padding-top: 1.4rem;
    }

    .footer-note i {
      font-size: 0.9rem;
      color: #999;
    }

    /* BOTÓN FLOTANTE MORADO CON LOGO DE DISCORD */
    .discord-float {
      position: fixed;
      bottom: 2.4rem;
      right: 2.4rem;
      z-index: 999;
      background: #5865F2;  /* morado/azul Discord */
      background: linear-gradient(145deg, #7c3aed, #5b21b6);
      color: #fff;
      width: 68px;
      height: 68px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(88, 101, 242, 0.5), 0 0 0 2px rgba(255, 255, 255, 0.05);
      transition: transform 0.2s ease, box-shadow 0.25s ease;
      text-decoration: none;
      border: none;
      font-size: 2.6rem;
      animation: floatButton 4s ease-in-out infinite;
    }

    .discord-float i {
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
    }

    .discord-float:hover {
      transform: scale(1.08) rotate(-3deg);
      box-shadow: 0 14px 40px rgba(88, 101, 242, 0.7), 0 0 0 3px rgba(255, 255, 255, 0.1);
      background: linear-gradient(145deg, #8b5cf6, #6d28d9);
    }

    @keyframes floatButton {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* tooltip sutil (opcional) */
    .discord-float::after {
      content: "Discord";
      position: absolute;
      right: 80px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #eee;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .discord-float:hover::after {
      opacity: 1;
    }

    /* responsive */
    @media (max-width: 550px) {
      .offline-card {
        padding: 2rem 1.5rem;
        border-radius: 2.2rem;
      }
      h1 {
        font-size: 2.6rem;
        letter-spacing: 2px;
      }
      .status-message {
        font-size: 1.3rem;
        padding: 0.7rem 1rem;
      }
      .main-icon {
        font-size: 3.2rem;
      }
      .discord-float {
        width: 58px;
        height: 58px;
        font-size: 2.2rem;
        bottom: 1.8rem;
        right: 1.8rem;
      }
      .discord-float::after {
        display: none; /* ocultar tooltip en móvil para no tapar */
      }
    }
  </style>
</head>
<body>

  <!-- TARJETA PRINCIPAL – solo 3 iconos en total (contando el principal) -->
  <div class="offline-card">
    <!-- icono grande: solo uno -->
    <i class="fas fa-circle-exclamation main-icon"></i>

    <h1>AQIRAX</h1>
    <div class="divider-line"></div>
    <span class="subtitle">PORTAL OFFLINE</span>

    <!-- mensaje con un único icono acompañante -->
    <div class="status-message">
      <i class="fas fa-power-off"></i>
      <span>Fuera de servicio · mantenimiento</span>
      <!-- un solo icono, sin saturar -->
    </div>

    <!-- pequeño badge con icono (opcional, pero solo uno) -->
    <div class="badge-mini">
      <i class="fas fa-clock"></i>
      <span>Vuelve pronto</span>
    </div>

    <!-- pie con un par de iconos mínimos -->
    <div class="footer-note">
      <i class="fas fa-code"></i>
      <span>AQIRAX · 2026</span>
      <i class="fas fa-lock"></i>
    </div>
  </div>

  <!-- BOTÓN FLOTANTE MORADO CON LOGO DE DISCORD (icono + enlace) -->
  <a href="https://discord.gg/xzcRAu2cg" target="_blank" rel="noopener noreferrer" class="discord-float" aria-label="Unirse a Discord">
    <i class="fab fa-discord"></i>
  </a>

  <!-- imagen oculta para embed (ya está en meta, pero se referencia) -->
  <div style="display: none;" aria-hidden="true">
    <img src="https://i.imgur.com/oZotBXK.jpeg" alt="AQIRAX offline" />
  </div>

  <!-- pequeño efecto de interacción en la tarjeta -->
  <script>
    (function(){
      const card = document.querySelector('.offline-card');
      if(card) {
        card.addEventListener('click', function(e) {
          this.style.transition = 'transform 0.08s ease';
          this.style.transform = 'scale(0.98)';
          setTimeout(() => {
            this.style.transform = 'scale(1)';
          }, 100);
        });
      }
    })();
  </script>
</body>
</html>
