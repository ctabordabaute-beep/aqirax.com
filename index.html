<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqirax AI · sin límites</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <!-- reCAPTCHA v2 -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        /* ----- RESET Y BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #f0f0f0;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ----- FONDO DE OLAS (canvas) ----- */
        #waveCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
        }

        /* ----- CONTENIDO PRINCIPAL ----- */
        #main-app {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #main-app.visible {
            opacity: 1;
        }

        /* ----- PANTALLA DE CARGA ----- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            animation: spin 0.5s linear infinite;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.06));
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            margin-top: 2rem;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #8a8a8a;
            font-weight: 300;
            opacity: 0.6;
            animation: pulseText 1.8s ease-in-out infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }

        /* ----- HEADER FIJO ----- */
        .app-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1.8rem;
            background: rgba(0, 0, 0, 0.75);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 10;
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: #c8c8c8;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 0.3rem 0.5rem;
            line-height: 1;
            transition: all 0.2s ease;
            border-radius: 10px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            transform: scale(1.05);
        }

        .menu-btn i {
            font-size: 1.5rem;
        }

        .header-logo {
            width: 44px;
            height: 44px;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.04));
            transition: transform 0.3s ease;
        }

        .header-logo:hover {
            transform: rotate(-8deg) scale(1.05);
        }

        .header-title-group {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
            flex: 1;
        }

        .header-title {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(145deg, #ffffff 0%, #b8b8b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-sub {
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 1.8px;
            color: #b0b0b0;
            -webkit-text-fill-color: #b0b0b0;
            background: none;
            margin-top: -2px;
            opacity: 0.7;
        }

        /* Grupo de botones del header (círculo con 2 iconos) */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 0;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 0.2rem 0.1rem;
            flex-shrink: 0;
        }

        .header-actions .action-btn {
            background: transparent;
            border: none;
            color: #a0a0a0;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.4rem 0.7rem;
            border-radius: 30px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 40px;
        }

        .header-actions .action-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            transform: scale(1.05);
        }

        .header-actions .action-btn:active {
            transform: scale(0.92);
        }

        .header-actions .action-divider {
            width: 1px;
            height: 28px;
            background: rgba(255, 255, 255, 0.06);
        }

        /* ----- MENÚ LATERAL ----- */
        .side-menu {
            position: fixed;
            top: 80px;
            left: 20px;
            width: 340px;
            max-width: 92vw;
            background: rgba(10, 10, 10, 0.97);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 1.6rem 1.4rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.95), 0 0 0 1px rgba(255, 255, 255, 0.02);
            transform: translateX(-130%);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 100;
            color: #c0c0c0;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .side-menu.open {
            transform: translateX(0);
        }

        .side-menu::-webkit-scrollbar {
            width: 4px;
        }
        .side-menu::-webkit-scrollbar-track {
            background: transparent;
        }
        .side-menu::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 10px;
        }

        .menu-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #5a5a5a;
            padding: 0.6rem 0.4rem 0.3rem 0.4rem;
            font-weight: 400;
        }

        .menu-item {
            padding: 0.7rem 0.9rem;
            border-radius: 12px;
            transition: all 0.15s ease;
            cursor: pointer;
            color: #c8c8c8;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            background: transparent;
            border: none;
            font-family: inherit;
            text-align: left;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #f0f0f0;
        }

        .menu-item i {
            width: 22px;
            color: #6a7a8a;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .menu-item:hover i {
            color: #9ab0c0;
        }

        .menu-item.primary {
            background: rgba(60, 80, 100, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            justify-content: center;
            font-weight: 500;
            color: #f0f0f0;
            margin: 0.3rem 0;
            padding: 0.8rem 1rem;
        }

        .menu-item.primary:hover {
            background: rgba(60, 80, 100, 0.3);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .menu-item.primary i {
            color: #9ab0c0;
        }

        .menu-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.04);
            margin: 0.3rem 0.4rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 0.4rem 0.8rem;
            margin: 0.2rem 0;
            transition: border 0.2s;
        }

        .search-box:focus-within {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .search-box i {
            color: #5a5a5a;
            font-size: 0.85rem;
            margin-right: 8px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #f0f0f0;
            font-size: 0.85rem;
            outline: none;
            width: 100%;
            padding: 0.4rem 0;
            font-family: inherit;
        }

        .search-box input::placeholder {
            color: #4a4a4a;
        }

        .chat-history-item {
            padding: 0.6rem 0.9rem;
            border-radius: 10px;
            transition: all 0.15s ease;
            cursor: pointer;
            color: #888;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            background: transparent;
            border: none;
            width: 100%;
            font-family: inherit;
            text-align: left;
        }

        .chat-history-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: #d0d0d0;
        }

        .chat-history-item i {
            color: #4a5a6a;
            font-size: 0.8rem;
            width: 18px;
        }

        .chat-history-item .chat-date {
            margin-left: auto;
            font-size: 0.65rem;
            color: #4a4a4a;
        }

        .menu-empty-history {
            color: #4a4a4a;
            font-size: 0.85rem;
            padding: 0.8rem 0.4rem;
            text-align: center;
            font-style: italic;
        }

        /* ----- MODAL CENTRADO ----- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            animation: modalFadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes modalFadeIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .modal-content {
            background: rgba(15, 15, 15, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 2.2rem 2.5rem;
            max-width: 440px;
            width: 92%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
            position: relative;
        }

        .modal-content::-webkit-scrollbar {
            width: 4px;
        }
        .modal-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 10px;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: transparent;
            border: none;
            color: #6a6a6a;
            font-size: 1.4rem;
            cursor: pointer;
            transition: color 0.2s;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .modal-close:hover {
            color: #f0f0f0;
            background: rgba(255, 255, 255, 0.04);
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1.4rem;
            background: linear-gradient(135deg, #ffffff 0%, #b0b0b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .modal-content .auth-form {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .modal-content .auth-form input {
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0.8rem 1.2rem;
            border-radius: 14px;
            color: #f0f0f0;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
            width: 100%;
            font-family: inherit;
        }

        .modal-content .auth-form input:focus {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(28, 28, 28, 0.95);
        }

        .modal-content .auth-form input::placeholder {
            color: #5a5a5a;
        }

        .modal-content .code-row {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        .modal-content .code-row input {
            flex: 1;
        }

        .modal-content .code-row .btn-code {
            background: rgba(40, 40, 40, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #f0f0f0;
            padding: 0.8rem 1.2rem;
            border-radius: 14px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .modal-content .code-row .btn-code:hover {
            background: rgba(60, 60, 60, 0.95);
        }

        .modal-content .code-row .btn-code:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .modal-content .recaptcha-wrapper {
            display: flex;
            justify-content: center;
            margin: 0.2rem 0;
            transform: scale(0.9);
            transform-origin: center;
        }

        .modal-content .form-message {
            font-size: 0.85rem;
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            display: none;
            text-align: center;
        }

        .modal-content .form-message.error {
            display: block;
            color: #ff6b6b;
            background: rgba(255, 50, 50, 0.08);
            border: 1px solid rgba(255, 50, 50, 0.15);
        }

        .modal-content .form-message.success {
            display: block;
            color: #6bff6b;
            background: rgba(50, 255, 50, 0.06);
            border: 1px solid rgba(50, 255, 50, 0.1);
        }

        .modal-content .btn-submit {
            background: rgba(60, 80, 100, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f0f0f0;
            padding: 0.9rem;
            border-radius: 16px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            margin-top: 0.3rem;
            font-family: inherit;
        }

        .modal-content .btn-submit:hover {
            background: rgba(60, 80, 100, 0.5);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .modal-content .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal-content .auth-switch {
            text-align: center;
            margin-top: 0.8rem;
            color: #6a6a6a;
            font-size: 0.9rem;
        }

        .modal-content .auth-switch a {
            color: #9ab0c0;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }

        .modal-content .auth-switch a:hover {
            color: #c0d0e0;
        }

        /* ----- CHAT WRAPPER ----- */
        .chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            padding: 0.8rem 1.8rem 1.2rem 1.8rem;
            overflow: hidden;
            height: 100%;
            position: relative;
        }

        #initialState {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            animation: floatGlow 4s ease-in-out infinite;
            text-align: center;
            padding: 1rem;
            margin-top: -1.5rem;
        }

        @keyframes floatGlow {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-16px) scale(1.01); }
            100% { transform: translateY(0px) scale(1); }
        }

        .initial-logo {
            width: 130px;
            height: 130px;
            object-fit: contain;
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.04));
            display: block;
            transition: transform 0.4s ease;
        }

        .initial-logo:hover {
            transform: scale(1.04) rotate(-4deg);
        }

        .initial-question {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f0f0f0 0%, #909090 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.02);
        }

        #initialState.hidden {
            display: none;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0.3rem 0.8rem 0.3rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            scroll-behavior: smooth;
        }

        /* Contenedor de mensaje con acciones */
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 82%;
            animation: msgFade 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .message-wrapper.user {
            align-self: flex-end;
        }

        .message-wrapper.ai {
            align-self: flex-start;
        }

        .message {
            padding: 0.8rem 1.4rem;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.98rem;
            word-break: break-word;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
        }

        @keyframes msgFade {
            0% { opacity: 0; transform: translateY(12px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message-wrapper.user .message {
            background: rgba(30, 30, 30, 0.9);
            border-bottom-right-radius: 6px;
            color: #f0f4ff;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .message-wrapper.ai .message {
            background: rgba(15, 15, 15, 0.9);
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #eaeaea;
        }

        /* Acciones debajo del mensaje (solo para IA) */
        .message-actions {
            display: flex;
            gap: 0.3rem;
            margin-top: 0.4rem;
            padding-left: 0.3rem;
            opacity: 0.5;
            transition: opacity 0.2s ease;
            flex-wrap: wrap;
        }

        .message-wrapper:hover .message-actions {
            opacity: 1;
        }

        .message-actions .action-btn {
            background: transparent;
            border: none;
            color: #7a7a7a;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .message-actions .action-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #e0e0e0;
            transform: scale(1.05);
        }

        .message-actions .action-btn:active {
            transform: scale(0.9);
        }

        .message-actions .action-btn.liked {
            color: #4a9a6a;
        }

        .message-actions .action-btn.disliked {
            color: #9a4a4a;
        }

        .message-actions .action-btn i {
            font-size: 0.9rem;
        }

        .message-actions .action-btn .btn-label {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        /* Mensaje de "Pensando..." */
        .message.thinking {
            align-self: flex-start;
            background: rgba(15, 15, 15, 0.9);
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #c0c0c0;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0.7rem 1.4rem;
            max-width: 82%;
            animation: msgFade 0.35s ease;
        }

        .thinking-logo {
            width: 30px;
            height: 30px;
            object-fit: contain;
            animation: spin 0.6s linear infinite;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.06));
        }

        .thinking-text {
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        .thinking-text i {
            margin-right: 6px;
            color: #6a8a9a;
        }

        /* Búsqueda en el chat (highlight) */
        .highlight {
            background: rgba(255, 200, 50, 0.25);
            padding: 0 2px;
            border-radius: 3px;
        }

        .search-active .message {
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .search-active .message.has-match {
            opacity: 1;
        }

        /* ----- INPUT ----- */
        .chat-input-area {
            display: flex;
            gap: 0.7rem;
            padding: 0.7rem 0 0.2rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 0.5rem;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .dropdown-wrapper {
            position: relative;
            display: inline-block;
        }

        .dropdown-btn {
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #f0f0f0;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            min-width: 120px;
            justify-content: center;
            font-family: inherit;
        }

        .dropdown-btn:hover {
            background: rgba(40, 40, 40, 0.95);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .dropdown-btn i {
            font-size: 0.9rem;
            transition: transform 0.3s ease;
        }

        .dropdown-btn.active i.fa-chevron-up {
            transform: rotate(180deg);

        (function() {
            const canvas = document.getElementById('waveCanvas');
            const ctx = canvas.getContext('2d');

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const waves = [{
                length: 0.002,
                amplitude: 85,
                speed: 0.015,
                color: 'rgba(255, 255, 255, 0.3)',
                lineWidth: 5,
                shadowBlur: 35,
                phase: 0
            }, {
                length: 0.003,
                amplitude: 65,
                speed: 0.01,
                color: 'rgba(160, 160, 160, 0.3)',
                lineWidth: 4,
                shadowBlur: 25,
                phase: 2
            }, {
                length: 0.0015,
                amplitude: 105,
                speed: 0.007,
                color: 'rgba(80, 80, 80, 0.3)',
                lineWidth: 6,
                shadowBlur: 45,
                phase: 4
            }];

            let tick = 0;

            function animate() {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                tick++;

                waves.forEach(wave => {
                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height / 2);
                    for (let x = 0; x < canvas.width; x++) {
                        const y = canvas.height / 2 +
                            Math.sin(x * wave.length + wave.phase) * wave.amplitude * Math.cos(x *
                                0.0004 + wave.phase * 0.4);
                        ctx.lineTo(x, y);
                    }
                    const flickerOpacity = Math.sin(tick * wave.speed * 5) * 0.15 + 0.85;
                    const flickerShadow = Math.sin(tick * wave.speed * 10) * 5 + wave.shadowBlur;
                    ctx.strokeStyle = wave.color.replace('0.3', (0.3 * flickerOpacity).toFixed(2));
                    ctx.lineWidth = wave.lineWidth;
                    ctx.shadowBlur = flickerShadow;
                    ctx.shadowColor = wave.color;
                    ctx.stroke();
                    wave.phase += wave.speed;
                });
                requestAnimationFrame(animate);
            }
            animate();
        })();

            }

            function generateChatId() {
                return 'chat_' + Date.now() + '_' + (++chatCounter);
            }

            function generateMessageId() {
                return 'msg_' + Date.now() + '_' + (++messageIdCounter) + '_' + Math.random().toString(36).substr(2, 4);
            }

            function addChatToHistory(title) {
                const chatId = generateChatId();
                const now = new Date();
                const dateStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                chatHistory.unshift({
                    id: chatId,
                    title: title || 'Nueva conversación',
                    date: dateStr,
                    messages: []
                });
                saveChatHistory();
                renderChatHistory();
                currentChatId = chatId;
                return chatId;
            }

            function renderChatHistory(filter = '') {
                if (!isRegistered) {
                    chatHistoryContainer.innerHTML =
                    `<div class="menu-empty-history">Inicia sesión para ver tu historial</div>`;
                    return;
                }

                const filtered = filter ?
                    chatHistory.filter(c => c.title.toLowerCase().includes(filter.toLowerCase())) :
                    chatHistory;

                if (filtered.length === 0) {
                    chatHistoryContainer.innerHTML =
                        `<div class="menu-empty-history">${filter ? 'No se encontraron resultados' : 'No hay conversaciones recientes'}</div>`;
                    return;
                }

                let html = '';
                filtered.forEach(chat => {
                    const isActive = chat.id === currentChatId ? 'style="background:rgba(255,255,255,0.04);color:#fff;"' :
                        '';
                    html += `
                        <button class="chat-history-item" data-chat-id="${chat.id}" ${isActive}>
                            <i class="fas fa-comment"></i>
                            <span>${chat.title}</span>
                            <span class="chat-date">${chat.date}</span>
                        </button>
                    `;
                });
                chatHistoryContainer.innerHTML = html;

                document.querySelectorAll('.chat-history-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const chatId = this.dataset.chatId;
                        loadChat(chatId);
                    });
                });
            }

            function loadChat(chatId) {
                if (!isRegistered) return;

                const chat = chatHistory.find(c => c.id === chatId);
                if (!chat) return;

                currentChatId = chatId;
                chatMessages.innerHTML = '';
                chatMessages.style.display = 'flex';

                if (initialState && !initialState.classList.contains('hidden')) {
                    initialState.classList.add('hidden');
                }

                if (chat.messages && chat.messages.length > 0) {
                    chat.messages.forEach(msg => {
                        renderMessage(msg.text, msg.sender, msg.id);
                    });
                } else {
                    const div = document.createElement('div');
                    div.className = 'message ai';
                    div.textContent = '💬 Chat vacío. Empieza una conversación.';
                    chatMessages.appendChild(div);
                }

                chatMessages.scrollTop = chatMessages.scrollHeight;
                renderChatHistory();
                toggleMenu(false);
            }

            function renderMessage(text, sender, msgId) {
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${sender}`;

                if (msgId) wrapper.dataset.msgId = msgId;

                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.textContent = text;
                wrapper.appendChild(msgDiv);

                // Solo mostrar acciones para mensajes de IA
                if (sender === 'ai') {
                    const actions = document.createElement('div');
                    actions.className = 'message-actions';

                    const actionsList = [
                        { icon: 'fa-copy', label: 'Copiar', action: 'copy' },
                        { icon: 'fa-rotate-right', label: 'Regenerar', action: 'regenerate' },
                        { icon: 'fa-thumbs-up', label: 'Like', action: 'like' },
                        { icon: 'fa-thumbs-down', label: 'Dislike', action: 'dislike' },
                        { icon: 'fa-share-alt', label: 'Compartir', action: 'share' },
                        { icon: 'fa-volume-up', label: 'Escuchar', action: 'listen' }
                    ];

                    actionsList.forEach(item => {
                        const btn = document.createElement('button');
                        btn.className = 'action-btn';
                        btn.dataset.action = item.action;
                        btn.innerHTML = `<i class="fas ${item.icon}"></i> <span class="btn-label">${item.label}</span>`;
                        btn.title = item.label;

                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            handleMessageAction(item.action, text, wrapper);
                        });

                        actions.appendChild(btn);
                    });

                    wrapper.appendChild(actions);
                }

                chatMessages.appendChild(wrapper);
                return wrapper;
            }

            // ----- MANEJADOR DE ACCIONES DE MENSAJE -----
            function handleMessageAction(action, text, wrapper) {
                switch (action) {
                    case 'copy':
                        navigator.clipboard.writeText(text).then(() => {
                            showToast('📋 Copiado al portapapeles');
                        }).catch(() => {
                            // Fallback
                            const textarea = document.createElement('textarea');
                            textarea.value = text;
                            document.body.appendChild(textarea);
                            textarea.select();
                            document.execCommand('copy');
                            document.body.removeChild(textarea);
                            showToast('📋 Copiado al portapapeles');
                        });
                        break;

                    case 'regenerate':
                        // Reemplazar el mensaje con una nueva respuesta
                        const msgDiv = wrapper.querySelector('.message');
                        if (msgDiv) {
                            msgDiv.textContent = 'Regenerando...';
                            msgDiv.style.opacity = '0.6';
                            setTimeout(() => {
                                const newReply = getAIResponse(text);
                                msgDiv.textContent = newReply;
                                msgDiv.style.opacity = '1';
                                // Actualizar en el historial
                                const msgId = wrapper.dataset.msgId;
                                if (msgId && currentChatId) {
                                    const chat = chatHistory.find(c => c.id === currentChatId);
                                    if (chat) {
                                        const msg = chat.messages.find(m => m.id === msgId);
                                        if (msg) msg.text = newReply;
                                        saveChatHistory();
                                    }
                                }
                                showToast('🔄 Mensaje regenerado');
                            }, 800);
                        }
                        break;

                    case 'like':
                        const likeBtn = wrapper.querySelector('[data-action="like"]');
                        if (likeBtn) {
                            likeBtn.classList.toggle('liked');
                            showToast(likeBtn.classList.contains('liked') ? '👍 Te gusta' : '👎 Like eliminado');
                        }
                        break;

                    case 'dislike':
                        const dislikeBtn = wrapper.querySelector('[data-action="dislike"]');
                        if (dislikeBtn) {
                            dislikeBtn.classList.toggle('disliked');
                            showToast(dislikeBtn.classList.contains('disliked') ? '👎 No te gusta' : '👍 Dislike eliminado');
                        }
                        break;

                    case 'share':
                        if (navigator.share) {
                            navigator.share({
                                title: 'Aqirax AI',
                                text: text,
                            }).catch(() => {});
                        } else {
                            navigator.clipboard.writeText(text).then(() => {
                                showToast('📋 Mensaje copiado para compartir');
                            });
                        }
                        break;

                    case 'listen':
                        // Usar SpeechSynthesis para leer el mensaje con voz humanizada
                        if (window.speechSynthesis) {
                            // Detener cualquier reproducción anterior
                            if (currentSpeech) {
                                window.speechSynthesis.cancel();
                            }
                            const utterance = new SpeechSynthesisUtterance(text);
                            utterance.lang = 'es-ES';
                            utterance.rate = 0.95;
                            utterance.pitch = 1.0;
                            // Buscar voz masculina en español
                            const voices = window.speechSynthesis.getVoices();
                            const maleVoice = voices.find(v => v.lang.startsWith('es') && v.name.toLowerCase().includes('male'));
                            if (maleVoice) utterance.voice = maleVoice;
                            currentSpeech = utterance;
                            utterance.onend = () => { currentSpeech = null; };
                            window.speechSynthesis.speak(utterance);
                            showToast('🔊 Reproduciendo...');
                        } else {
                            showToast('⚠️ Tu navegador no soporta síntesis de voz');
                        }
                        break;
                }
            }

            // ----- TOAST NOTIFICATIONS -----
            function showToast(msg) {
                const existing = document.querySelector('.toast-notification');
                if (existing) existing.remove();

                const toast = document.createElement('div');
                toast.className = 'toast-notification';
                toast.textContent = msg;
                Object.assign(toast.style, {
                    position: 'fixed',
                    bottom: '100px',
                    left: '50%',
                    transform: 'translateX(-50%)',
                    background: 'rgba(20,20,20,0.95)',
                    color: '#f0f0f0',
                    padding: '0.7rem 1.6rem',
                    borderRadius: '30px',
                    border: '1px solid rgba(255,255,255,0.06)',
                    fontSize: '0.9rem',
                    zIndex: '300',
                    boxShadow: '0 8px 30px rgba(0,0,0,0.8)',
                    backdropFilter: 'blur(8px)',
                    animation: 'toastFade 0.3s ease',
                    fontFamily: "'Segoe UI', system-ui, sans-serif",
                    pointerEvents: 'none'
                });

                // Agregar estilo de animación
                if (!document.getElementById('toastStyle')) {
                    const style = document.createElement('style');
                    style.id = 'toastStyle';
                    style.textContent = `
                        @keyframes toastFade {
                            0% { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.9); }
                            100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
                        }
                    `;
                    document.head.appendChild(style);
                }

                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.4s ease';
                    setTimeout(() => toast.remove(), 500);
                }, 2500);
            }

            // ----- FUNCIONES DEL CHAT -----
            function saveMessageToHistory(text, sender) {
                if (!isRegistered) return;

                if (!currentChatId) {
                    const title = text.length > 30 ? text.substring(0, 30) + '...' : text;
                    currentChatId = addChatToHistory(title);
                }

                const chat = chatHistory.find(c => c.id === currentChatId);
                if (chat) {
                    const msgId = generateMessageId();
                    chat.messages.push({ id: msgId, text, sender });
                    if (chat.messages.length === 1 && sender === 'user') {
                        chat.title = text.length > 30 ? text.substring(0, 30) + '...' : text;
                    }
                    saveChatHistory();
                    renderChatHistory();
                    return msgId;
                }
                return null;
            }

            function addMessage(text, sender, isThinking = false) {
                if (!isRegistered) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'message-wrapper ai';
                    const div = document.createElement('div');
                    div.className = 'message';
                    div.textContent = '⚠️ Por favor, regístrate en el menú lateral para usar el chat.';
                    wrapper.appendChild(div);
                    chatMessages.appendChild(wrapper);
                    chatMessages.style.display = 'flex';
                    if (initialState) initialState.classList.add('hidden');
                    return wrapper;
                }

                if (initialState && !initialState.classList.contains('hidden')) {
                    initialState.classList.add('hidden');
                    chatMessages.style.display = 'flex';
                }

                if (isThinking) {
                    const div = document.createElement('div');
                    div.className = 'message thinking';
                    const img = document.createElement('img');
                    img.src = 'logo.png';
                    img.alt = 'pensando';
                    img.className = 'thinking-logo';
                    const span = document.createElement('span');
                    span.className = 'thinking-text';
                    span.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${text}`;
                    div.appendChild(img);
                    div.appendChild(span);
                    chatMessages.appendChild(div);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    return div;
                }

                const msgId = saveMessageToHistory(text, sender);
                const wrapper = renderMessage(text, sender, msgId);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                return wrapper;
            }

            const aiResponses = [
                "🧠 Sin límites. Tu pregunta es el comienzo.",
                "⚡ No hay filtros. Aquí tienes tu respuesta.",
                "🔮 Todo es posible. Sigue indagando.",
                "💬 Rompe esquemas. ¿Qué más deseas saber?",
                "🔥 Libertad total. Aquí va tu respuesta.",
                "🌀 Sin juicios, solo conocimiento crudo.",
                "🌌 No hay barreras. Tu mente es el único límite.",
                "🤖 Sin censura, sin moral impuesta. Disfruta."
            ];

            function getAIResponse(userText) {
                let reply = '';
                if (userText.trim().length > 0) {
                    const randomIndex = Math.floor(Math.random() * aiResponses.length);
                    reply = aiResponses[randomIndex];
                    if (Math.random() > 0.6) {
                        const words = userText.split(' ').slice(0, 3).join(' ');
                        reply += ` (sobre "${words}..." · sin filtro)`;
                    }
                } else {
                    reply = '🕊️ El silencio también es una respuesta. ¿Qué deseas indagar?';
                }
                return reply;
            }

            function processUserMessage(text) {
                if (text.trim() === '' || isProcessing) return;

                if (!isRegistered) {
                    addMessage('⚠️ Por favor, regístrate en el menú lateral para usar el chat.', 'ai');
                    return;
                }

                if (!currentChatId) {
                    const title = text.length > 30 ? text.substring(0, 30) + '...' : text;
                    currentChatId = addChatToHistory(title);
                }

                if (initialState && !initialState.classList.contains('hidden')) {
                    initialState.classList.add('hidden');
                    chatMessages.style.display = 'flex';
                }

                addMessage(text, 'user');
                userInput.value = '';
                userInput.focus();

                isProcessing = true;
                const thinkingMsg = addMessage('Pensando...', 'ai', true);

                setTimeout(() => {
                    if (thinkingMsg && thinkingMsg.parentNode) {
                        thinkingMsg.remove();
                    }
                    const reply = getAIResponse(text);
                    addMessage(reply, 'ai');
                    isProcessing = false;
                    renderChatHistory();
                }, 3000);
            }

            // ----- NUEVO CHAT (desde header y menú) -----
            function createNewChat() {
                if (!isRegistered) {
                    openModal(false);
                    return;
                }
                resetChat();
                toggleMenu(false);
                userInput.focus();
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper ai';
                const div = document.createElement('div');
                div.className = 'message';
                div.textContent = '✨ Nuevo chat iniciado. Escribe tu mensaje.';
                wrapper.appendChild(div);
                chatMessages.appendChild(wrapper);
                chatMessages.style.display = 'flex';
                initialState.classList.add('hidden');
                setTimeout(() => {
                    if (wrapper.parentNode) wrapper.remove();
                }, 3000);
            }

            headerNewChatBtn.addEventListener('click', createNewChat);
            newChatBtn.addEventListener('click', createNewChat);

            // ----- BÚSQUEDA EN EL CHAT (desde header) -----
            let searchActive = false;

            function openSearchModal() {
                if (!isRegistered) {
                    showToast('⚠️ Inicia sesión para buscar en el chat');
                    return;
                }
                searchModal.classList.add('active');
                chatSearchInput.value = '';
                chatSearchInput.focus();
                searchStats.textContent = '0 resultados';
                clearHighlights();
            }

            function closeSearchModal() {
                searchModal.classList.remove('active');
                clearHighlights();
                chatMessages.classList.remove('search-active');
                searchActive = false;
            }

            function clearHighlights() {
                document.querySelectorAll('.highlight').forEach(el => {
                    const parent = el.parentNode;
                    parent.replaceChild(document.createTextNode(el.textContent), el);
                    parent.normalize();
                });
                document.querySelectorAll('.message.has-match').forEach(el => {
                    el.classList.remove('has-match');
                });
                chatMessages.classList.remove('search-active');
            }

            function performSearch(query) {
                if (!query.trim()) {
                    clearHighlights();
                    searchStats.textContent = '0 resultados';
                    return;
                }

                chatMessages.classList.add('search-active');
                let matches = 0;

                // Recorrer todos los mensajes
                document.querySelectorAll('.message-wrapper .message').forEach(msgEl => {
                    const text = msgEl.textContent;
                    const lowerQuery = query.toLowerCase();
                    const lowerText = text.toLowerCase();

                    // Buscar coincidencias
                    let found = false;
                    if (lowerText.includes(lowerQuery)) {
                        found = true;
                        matches++;

                        // Resaltar coincidencias
                        const wrapper = msgEl.parentNode;
                        const originalText = text;
                        const parts = originalText.split(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'));
                        if (parts.length > 1) {
                            const newHTML = parts.map(part =>
                                part.toLowerCase() === query.toLowerCase() ?
                                `<span class="highlight">${part}</span>` :
                                part
                            ).join('');
                            msgEl.innerHTML = newHTML;
                        }
                    }

                    // Marcar si tiene coincidencia
                    const wrapper = msgEl.parentNode;
                    if (found) {
                        wrapper.classList.add('has-match');
                    } else {
                        wrapper.classList.remove('has-match');
                    }
                });

                searchStats.textContent = `${matches} resultado${matches !== 1 ? 's' : ''}`;
                searchActive = true;
            }

            headerSearchBtn.addEventListener('click', openSearchModal);

            closeSearchBtn.addEventListener('click', closeSearchModal);

            searchModal.addEventListener('click', function(e) {
                if (e.target === this) closeSearchModal();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && searchModal.classList.contains('active')) {
                    closeSearchModal();
                }
            });

            chatSearchInput.addEventListener('input', function() {
                performSearch(this.value);
            });

            // ----- DROPDOWN -----
            function toggleDropdown(e) {
                e.stopPropagation();
                dropdownMenu.classList.toggle('open');
                dropdownBtn.classList.toggle('active');
            }

            dropdownBtn.addEventListener('click', toggleDropdown);

            document.addEventListener('click', function(e) {
                if (!dropdownBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                    dropdownMenu.classList.remove('open');
                    dropdownBtn.classList.remove('active');
                }
            });

            dropItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (this.classList.contains('locked')) {
                        this.style.opacity = '0.6';
                        setTimeout(() => { this.style.opacity = ''; }, 300);
                        return;
                    }
                    dropItems.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    const label = this.dataset.label || this.textContent.trim();
                    selectedModelSpan.textContent = label;
                    currentModel = this.dataset.value || 'flash';
                    dropdownMenu.classList.remove('open');
                    dropdownBtn.classList.remove('active');
                });
            });

            // ----- MENÚ LATERAL -----
            function toggleMenu(open) {
                const shouldOpen = open !== undefined ? open : !sideMenu.classList.contains('open');
                if (shouldOpen) {
                    sideMenu.classList.add('open');
                    menuOverlay.classList.add('active');
                } else {
                    sideMenu.classList.remove('open');
                    menuOverlay.classList.remove('active');
                }
            }

            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMenu();
            });

            menuOverlay.addEventListener('click', () => {
                toggleMenu(false);
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (sideMenu.classList.contains('open')) toggleMenu(false);
                    if (dropdownMenu.classList.contains('open')) {
                        dropdownMenu.classList.remove('open');
                        dropdownBtn.classList.remove('active');
                    }
                    if (authModal.classList.contains('active')) {
                        closeModal();
                    }
                    if (searchModal.classList.contains('active')) {
                        closeSearchModal();
                    }
                }
            });

            // ----- MODAL CENTRADO -----
            function openModal(loginMode = false) {
                isLoginMode = loginMode;
                modalTitle.textContent = loginMode ? 'Iniciar Sesión' : 'Registrarse';
                registerBtn.textContent = loginMode ? 'Iniciar Sesión' : 'Registrarse';
                switchToLogin.textContent = loginMode ? '¿No tienes cuenta? Registrarse' : '¿Ya tienes cuenta? Iniciar sesión';

                const usernameField = regUsername;
                const confirmField = regConfirmPassword;
                const codeRow = document.querySelector('.code-row');

                if (loginMode) {
                    usernameField.style.display = 'none';
                    confirmField.style.display = 'none';
                    codeRow.style.display = 'none';
                    sendCodeBtn.style.display = 'none';
                    regCode.style.display = 'none';
                } else {
                    usernameField.style.display = 'block';
                    confirmField.style.display = 'block';
                    codeRow.style.display = 'flex';
                    sendCodeBtn.style.display = 'block';
                    regCode.style.display = 'block';
                }

                formMessage.className = 'form-message';
                formMessage.textContent = '';
                authModal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                authModal.classList.remove('active');
                document.body.style.overflow = '';
                grecaptcha.reset();
                formMessage.className = 'form-message';
                formMessage.textContent = '';
            }

            modalCloseBtn.addEventListener('click', closeModal);
            authModal.addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            // ----- AUTENTICACIÓN -----
            authMenuBtn.addEventListener('click', function() {
                toggleMenu(false);
                if (isRegistered) {
                    if (confirm('¿Cerrar sesión?')) {
                        isRegistered = false;
                        currentUser = '';
                        chatHistory = [];
                        chatMessages.innerHTML = '';
                        chatMessages.style.display = 'none';
                        if (initialState) initialState.classList.remove('hidden');
                        currentChatId = null;
                        authMenuText.textContent = 'Registrarse / Iniciar sesión';
                        document.querySelector('#authMenuBtn i').className = 'fas fa-user-plus';
                        renderChatHistory();
                        localStorage.removeItem('aqirax_chat_history_' + currentUser);
                        // Cerrar búsqueda si estaba abierta
                        if (searchModal.classList.contains('active')) closeSearchModal();
                    }
                } else {
                    openModal(false);
                }
            });

            switchToLogin.addEventListener('click', function() {
                openModal(!isLoginMode);
            });

            sendCodeBtn.addEventListener('click', async function() {
                const email = regEmail.value.trim();
                if (!email || !email.includes('@')) {
                    showMessage('Por favor, ingresa un correo válido.', 'error');
                    return;
                }

                const recaptchaResponse = grecaptcha.getResponse();
                if (!recaptchaResponse) {
                    showMessage('Por favor, completa el reCAPTCHA.', 'error');
                    return;
                }

                this.disabled = true;
                this.textContent = 'Enviando...';

                try {
                    generatedCode = generarCodigo();
                    const result = await enviarCodigo(email, generatedCode);
                    if (result.success) {
                        isCodeSent = true;
                        showMessage('✅ Código enviado a tu correo.', 'success');
                        regCode.disabled = false;
                        regCode.focus();
                    } else {
                        showMessage('❌ Error: ' + (result.error || 'Intenta de nuevo'), 'error');
                        isCodeSent = false;
                    }
                } catch (error) {
                    showMessage('❌ Error inesperado: ' + error.message, 'error');
                    isCodeSent = false;
                }

                this.disabled = false;
                this.textContent = 'Enviar código';
            });

            registerBtn.addEventListener('click', function() {
                if (isLoginMode) {
                    const email = regEmail.value.trim();
                    const password = regPassword.value;

                    if (!email || !password) {
                        showMessage('Por favor, completa todos los campos.', 'error');
                        return;
                    }

                    const recaptchaResponse = grecaptcha.getResponse();
                    if (!recaptchaResponse) {
                        showMessage('Por favor, completa el reCAPTCHA.', 'error');
                        return;
                    }

                    isRegistered = true;
                    currentUser = email.split('@')[0];
                    showMessage('✅ ¡Bienvenido de nuevo, ' + currentUser + '!', 'success');
                    registerBtn.disabled = true;
                    registerBtn.textContent = '✅ Conectado';
                    authMenuText.textContent = currentUser + ' · Cerrar sesión';
                    document.querySelector('#authMenuBtn i').className = 'fas fa-user-check';

                    setTimeout(() => {
                        closeModal();
                        registerBtn.disabled = false;
                        registerBtn.textContent = 'Iniciar Sesión';
                        loadChatHistory();
                        grecaptcha.reset();
                    }, 1500);
                    return;
                }

                const email = regEmail.value.trim();
                const username = regUsername.value.trim();
                const password = regPassword.value;
                const confirmPassword = regConfirmPassword.value;
                const code = regCode.value.trim();

                if (!email || !username || !password || !confirmPassword) {
                    showMessage('Por favor, completa todos los campos.', 'error');
                    return;
                }

                if (password !== confirmPassword) {
                    showMessage('Las contraseñas no coinciden.', 'error');
                    return;
                }

                if (password.length < 6) {
                    showMessage('La contraseña debe tener al menos 6 caracteres.', 'error');
                    return;
                }

                const recaptchaResponse = grecaptcha.getResponse();
                if (!recaptchaResponse) {
                    showMessage('Por favor, completa el reCAPTCHA.', 'error');
                    return;
                }

                if (!isCodeSent || !code) {
                    showMessage('Por favor, solicita el código de verificación.', 'error');
                    return;
                }

                if (code !== generatedCode) {
                    showMessage('❌ Código incorrecto.', 'error');
                    return;
                }

                isRegistered = true;
                currentUser = username;
                showMessage('✅ ¡Registro exitoso! Bienvenido, ' + username + '.', 'success');
                registerBtn.disabled = true;
                registerBtn.textContent = '✅ Registrado';
                authMenuText.textContent = username + ' · Cerrar sesión';
                document.querySelector('#authMenuBtn i').className = 'fas fa-user-check';

                setTimeout(() => {
                    closeModal();
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Registrarse';
                    loadChatHistory();
                    grecaptcha.reset();
                }, 1500);
            });

            function showMessage(msg, type) {
                formMessage.textContent = msg;
                formMessage.className = 'form-message ' + type;
                setTimeout(() => {
                    if (formMessage.className.includes(type)) {
                        formMessage.className = 'form-message';
                        formMessage.textContent = '';
                    }
                }, 8000);
            }

            function resetChat() {
                chatMessages.innerHTML = '';
                chatMessages.style.display = 'none';
                if (initialState) {
                    initialState.classList.remove('hidden');
                }
                currentChatId = null;
                // Cerrar búsqueda si estaba abierta
                if (searchModal.classList.contains('active')) closeSearchModal();
            }

            // ----- MICRÓFONO -----
            function initSpeech() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    recognitionSupported = false;
                    micBtn.style.opacity = '0.4';
                    micBtn.title = 'Micrófono no soportado';
                    return;
                }
                recognitionSupported = true;
                recognition = new SpeechRecognition();
                recognition.lang = 'es-ES';
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    userInput.value = transcript;
                    processUserMessage(transcript);
                    micBtn.classList.remove('listening');
                    isListening = false;
                };

                recognition.onerror = (event) => {
                    micBtn.classList.remove('listening');
                    isListening = false;
                    if (event.error === 'not-allowed') {
                        userInput.placeholder = 'Permiso denegado para micrófono';
                    } else {
                        userInput.placeholder = 'Error: ' + event.error;
                    }
                    setTimeout(() => {
                        userInput.placeholder = 'Escribe o usa el micrófono...';
                    }, 3000);
                };

                recognition.onend = () => {
                    micBtn.classList.remove('listening');
                    isListening = false;
                };
            }

            function toggleMicrophone() {
                if (!recognitionSupported) {
                    alert('Tu navegador no soporta reconocimiento de voz.');
                    return;
                }
                if (isListening) {
                    recognition.stop();
                    micBtn.classList.remove('listening');
                    isListening = false;
                    return;
                }
                try {
                    recognition.start();
                    micBtn.classList.add('listening');
                    isListening = true;
                    userInput.placeholder = '🎤 Escuchando...';
                } catch (e) {
                    micBtn.classList.remove('listening');
                    isListening = false;
                }
            }

            micBtn.addEventListener('click', toggleMicrophone);

            // ----- ENVÍO -----
            function handleSend() {
                const text = userInput.value.trim();
                if (text === '') return;
                processUserMessage(text);
            }

            sendBtn.addEventListener('click', handleSend);
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSend();
                }
            });

            // ----- OCULTAR LOADER -----
            function hideLoaderAndShowApp() {
                loader.classList.add('hidden');
                mainApp.classList.add('visible');
                userInput.focus();
                renderChatHistory();
                // Cargar voces para el speech
                if (window.speechSynthesis) {
                    window.speechSynthesis.getVoices();
                    window.speechSynthesis.onvoiceschanged = () => {
                        window.speechSynthesis.getVoices();
                    };
                }
            }

            setTimeout(hideLoaderAndShowApp, 1800);

            window.addEventListener('load', function() {
                setTimeout(() => {
                    if (!loader.classList.contains('hidden')) {
                        hideLoaderAndShowApp();
                    }
                }, 3000);
            });

            // ----- MANEJO DE ERRORES DE IMAGEN -----
            function handleLogoError(imgElement, fallbackIcon) {
                if (!imgElement) return;
                imgElement.addEventListener('error', function() {
                    this.style.display = 'none';
                    const parent = this.parentNode;
                    const fallback = document.createElement('i');
                    fallback.className = `fas ${fallbackIcon || 'fa-brain'}`;
                    fallback.style.fontSize = '3.5rem';
                    fallback.style.color = '#6a8a9a';
                    parent.insertBefore(fallback, this);
                });
            }

            handleLogoError(document.getElementById('loaderLogo'), 'fa-brain');
            handleLogoError(document.getElementById('headerLogo'), 'fa-bolt');
            handleLogoError(document.getElementById('initialLogo'), 'fa-compass');

            initSpeech();

            console.log('🚀 Aqirax AI · Header con nuevo chat y búsqueda · Acciones en mensajes');
            console.log('📁 Asegúrate de que logo.png esté en la misma carpeta.');
        })();
    </script>

</body>
</html>
